services:
  redis:
    image: redis:7.2-alpine
    container_name: airstream-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  adsb-gateway:
    build:
      context: .
      dockerfile: ./adsb-gateway/Dockerfile
    container_name: airstream-adsb-gateway
    volumes:
      - ./logs/gateway:/usr/src/app/logs
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: airstream-backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./logs/backend:/usr/src/app/logs
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
  ui:
    build:
      context: .
      dockerfile: ./ui/Dockerfile
      args:
        UI_API_BASE_URL: ws://localhost:${BACKEND_PORT}/ws
    ports:
      - "${UI_PORT}:80"
    env_file:
      - .env
    depends_on:
      - backend
volumes:
  redis_data:
